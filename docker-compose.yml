services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: http://db:8080
      DATABASE_AUTH_TOKEN: ""
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      NEXTAUTH_URL: http://localhost:3000
      APP_MODE: web
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: ghcr.io/tursodatabase/libsql-server:latest
    ports:
      - "8080:8080"
    volumes:
      - libsql_data:/var/lib/sqld
    environment:
      SQLD_NODE: primary
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  libsql_data:
