services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: http://db:8080
      DATABASE_AUTH_TOKEN: ""
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      NEXTAUTH_URL: http://localhost:3000
      APP_MODE: web
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: ghcr.io/tursodatabase/libsql-server:latest
    ports:
      - "8080:8080"
    volumes:
      - libsql_data:/var/lib/sqld
    environment:
      SQLD_NODE: primary
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health HTTP/1.0\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  libsql_data:
