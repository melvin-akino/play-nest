<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Jungle Gym Play House — Starting</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #eff6ff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card { text-align: center; }
    .logo { font-size: 56px; margin-bottom: 16px; }
    .title { font-size: 26px; font-weight: 700; color: #1e40af; }
    .sub { font-size: 14px; color: #6b7280; margin-top: 8px; letter-spacing: 0.02em; }
    .spinner {
      width: 28px; height: 28px; margin: 20px auto 0;
      border: 3px solid #bfdbfe; border-top-color: #2563eb;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <img src="/logo.png" alt="Jungle Gym Play House" style="width:72px;height:72px;object-fit:contain;margin-bottom:16px;" />
    <div class="title">Jungle Gym Play House</div>
    <div class="sub">Starting application…</div>
    <div class="spinner"></div>
  </div>
  <script>
    async function checkReady() {
      try {
        const r = await fetch('http://127.0.0.1:3000/api/health');
        if (r.ok) { window.location.href = 'http://127.0.0.1:3000'; return; }
      } catch (_) {}
      setTimeout(checkReady, 500);
    }
    setTimeout(checkReady, 800);
  </script>
</body>
</html>
